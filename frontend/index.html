<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemMaster - 化学式助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .app-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .app-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .app-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 导航标签 */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: 500;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        /* 主要内容区域 */
        .main-content {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 化学式转换页面 */
        .formula-section {
            padding: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 16px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            font-family: 'Consolas', 'Monaco', monospace;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid #e0e0e0;
            color: #333;
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* 预览区域 */
        .preview-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .preview-header h3 {
            color: #333;
            font-size: 18px;
        }

        .format-selector {
            display: flex;
            gap: 8px;
        }

        .format-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .format-btn:hover {
            border-color: #667eea;
        }

        .format-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .preview-content {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .preview-content .formula-display {
            font-size: 32px;
            font-family: 'Times New Roman', serif;
            color: #333;
        }

        .preview-content .latex-code {
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* 状态消息 */
        .status-message {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .status-message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }

        /* 示例区域 */
        .examples-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }

        .examples-section h4 {
            margin-bottom: 15px;
            color: #666;
            font-size: 16px;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .chip:hover {
            background: #667eea;
            color: white;
        }

        /* 反应方程式页面 */
        .equation-section {
            padding: 30px;
        }

        /* 批量处理页面 */
        .batch-section {
            padding: 30px;
        }

        .batch-section textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px;
            resize: vertical;
        }

        .batch-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 结构编辑器页面 */
        .structure-section {
            padding: 20px;
        }

        /* 页脚 */
        .app-footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            padding: 20px;
        }

        .app-footer a {
            color: white;
            text-decoration: none;
        }

        .app-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <h1>🧪 ChemMaster</h1>
            <p>AI 驱动的化学式编辑器 - 支持化学式转换、方程式平衡、结构绘制</p>
        </header>

        <!-- 导航标签 -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="formula">化学式转换</button>
            <button class="nav-tab" data-tab="equation">反应方程式</button>
            <button class="nav-tab" data-tab="structure">结构绘制</button>
            <button class="nav-tab" data-tab="batch">批量处理</button>
        </nav>

        <!-- 主要内容 -->
        <main class="main-content">
            <!-- 化学式转换 -->
            <section class="tab-content active" id="formula-tab">
                <div class="formula-section">
                    <div class="input-group">
                        <label for="formula-input">输入化学式</label>
                        <div class="input-wrapper">
                            <input type="text" id="formula-input"
                                   placeholder="例如: H2SO4, Ca(OH)2, NH4+">
                            <button id="formula-convert-btn" class="btn btn-primary">转换</button>
                            <button id="formula-clear-btn" class="btn btn-outline">清除</button>
                        </div>
                        <div id="formula-status" class="status-message"></div>
                    </div>

                    <div class="preview-section">
                        <div class="preview-header">
                            <h3>预览</h3>
                            <div class="format-selector">
                                <button class="format-btn active" data-format="subscript">下标格式</button>
                                <button class="format-btn" data-format="latex">LaTeX 格式</button>
                            </div>
                        </div>
                        <div class="preview-content">
                            <div id="formula-preview" class="formula-display">
                                <span style="color: #999;">输入化学式以预览</span>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button id="formula-copy-btn" class="btn btn-primary">复制结果</button>
                        <button id="formula-insert-word-btn" class="btn btn-success">插入 Word</button>
                        <button id="formula-export-latex-btn" class="btn btn-secondary">导出 LaTeX</button>
                    </div>

                    <div class="examples-section">
                        <h4>示例化学式：</h4>
                        <div class="example-chips">
                            <span class="chip" data-formula="H2SO4">硫酸 H₂SO₄</span>
                            <span class="chip" data-formula="Ca(OH)2">氢氧化钙 Ca(OH)₂</span>
                            <span class="chip" data-formula="NH4+">铵根 NH₄⁺</span>
                            <span class="chip" data-formula="CO2">二氧化碳 CO₂</span>
                            <span class="chip" data-formula="NaCl">氯化钠 NaCl</span>
                            <span class="chip" data-formula="C6H12O6">葡萄糖 C₆H₁₂O₆</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 反应方程式 -->
            <section class="tab-content" id="equation-tab">
                <div class="equation-section">
                    <div class="input-group">
                        <label for="equation-input">输入反应方程式</label>
                        <div class="input-wrapper">
                            <input type="text" id="equation-input"
                                   placeholder="例如: Fe + O2 -> Fe2O3">
                            <button id="equation-convert-btn" class="btn btn-primary">转换</button>
                            <button id="equation-clear-btn" class="btn btn-outline">清除</button>
                        </div>
                        <div class="input-group" style="margin-top: 10px;">
                            <label>
                                <input type="checkbox" id="balance-check" checked>
                                自动平衡方程式
                            </label>
                        </div>
                        <div id="equation-status" class="status-message"></div>
                    </div>

                    <div class="preview-section">
                        <div class="preview-header">
                            <h3>预览</h3>
                            <div class="format-selector">
                                <button class="format-btn active" data-format="subscript">下标格式</button>
                                <button class="format-btn" data-format="latex">LaTeX 格式</button>
                            </div>
                        </div>
                        <div class="preview-content">
                            <div id="equation-preview" class="formula-display">
                                <span style="color: #999;">输入方程式以预览</span>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button id="equation-copy-btn" class="btn btn-primary">复制结果</button>
                        <button id="equation-insert-word-btn" class="btn btn-success">插入 Word</button>
                        <button id="equation-export-latex-btn" class="btn btn-secondary">导出 LaTeX</button>
                    </div>

                    <div class="examples-section">
                        <h4>示例方程式：</h4>
                        <div class="example-chips">
                            <span class="chip" data-equation="Fe + O2 -> Fe2O3">铁的氧化</span>
                            <span class="chip" data-equation="H2 + O2 -> H2O">氢气燃烧</span>
                            <span class="chip" data-equation="Na + H2O -> NaOH + H2">钠与水反应</span>
                            <span class="chip" data-equation="CH4 + O2 -> CO2 + H2O">甲烷燃烧</span>
                            <span class="chip" data-equation="HCl + NaOH -> NaCl + H2O">中和反应</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 结构绘制 -->
            <section class="tab-content" id="structure-tab">
                <div class="structure-section">
                    <div id="structure-editor-container"></div>
                </div>
            </section>

            <!-- 批量处理 -->
            <section class="tab-content" id="batch-tab">
                <div class="batch-section">
                    <div class="input-group">
                        <label for="batch-input">输入多个化学式或方程式（每行一个）</label>
                        <textarea id="batch-input"
                                  placeholder="H2SO4
Ca(OH)2
Fe + O2 -> Fe2O3
H2 + O2 -> H2O"></textarea>
                    </div>

                    <div class="input-group">
                        <label>
                            <input type="checkbox" id="batch-balance-check" checked>
                            自动平衡方程式
                        </label>
                    </div>

                    <div class="button-group">
                        <button id="batch-process-btn" class="btn btn-primary">批量处理</button>
                        <button id="batch-copy-btn" class="btn btn-secondary">复制全部</button>
                        <button id="batch-export-btn" class="btn btn-success">导出文档</button>
                    </div>

                    <div class="preview-section">
                        <div class="preview-header">
                            <h3>处理结果</h3>
                        </div>
                        <div class="preview-content">
                            <div id="batch-preview" style="white-space: pre-wrap; font-size: 16px;">
                                <span style="color: #999;">输入内容并点击"批量处理"</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer class="app-footer">
            <p>ChemMaster - AI 驱动的化学式编辑器 | <a href="https://github.com/yourname/chemmaster">GitHub</a></p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="plugins/word.js"></script>
    <script src="plugins/latex.js"></script>
    <script src="plugins.js"></script>
    <script src="structure-editor.js"></script>
    <script src="editor.js"></script>
</body>
</html>
